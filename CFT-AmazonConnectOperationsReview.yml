          """P1: AI Agent Logging & Observability"""
          def check_ai_agent_logging(assistant_id, account_id, aws_region):
              html = "<b>AI Agent Logging &amp; Observability</b><br>"
              logger.info(f"[P1] Starting AI Agent Logging check for assistant_id={assistant_id}, account={account_id}, region={aws_region}")
              try:
                  assistant_arn = f"arn:aws:wisdom:{aws_region}:{account_id}:assistant/{assistant_id}"
                  logger.info(f"[P1] Constructed assistant ARN: {assistant_arn}")
                  response = logs_client.describe_deliveries()
                  deliveries = response.get('deliveries', [])
                  logger.info(f"[P1] describe_deliveries returned {len(deliveries)} total delivery/deliveries")
                  for d in deliveries:
                      logger.debug(f"[P1] Delivery: id={d.get('id')}, source={d.get('deliverySourceName')}, dest_type={d.get('deliveryDestinationType')}")
                  # Match by checking if assistant_id appears in source name OR by checking delivery source ARNs
                  matching = []
                  for d in deliveries:
                      source_name = d.get('deliverySourceName', '')
                      # Check direct assistant_id match in source name
                      if assistant_id in source_name:
                          matching.append(d)
                      # Also check for wisdom/qconnect delivery sources (WdDeliverySource pattern)
                      elif 'WdDeliverySource' in source_name or 'wisdom' in source_name.lower() or 'qconnect' in source_name.lower():
                          # This could be the assistant's delivery - check the delivery source details
                          try:
                              source_detail = logs_client.describe_delivery_sources()
                              for src in source_detail.get('deliverySources', []):
                                  if src.get('name') == source_name and assistant_id in src.get('resourceArn', ''):
                                      matching.append(d)
                                      logger.info(f"[P1] Matched delivery via source ARN: {src.get('resourceArn')}")
                                      break
                          except Exception as src_err:
                              logger.debug(f"[P1] Could not check delivery source detail: {src_err}")
                  logger.info(f"[P1] Found {len(matching)} delivery/deliveries matching assistant_id={assistant_id}")
                  if matching:
                      html += f"<br>CloudWatch log delivery configured ({len(matching)} delivery/deliveries found).<br>"
                      html += """<table style="width: 80%"><tr><th>Delivery ID</th><th>Source</th><th>Destination Type</th></tr>"""
                      for d in matching:
                          html += f"<tr><td>{escape(d.get('id', 'N/A'))}</td><td>{escape(d.get('deliverySourceName', 'N/A'))}</td><td>{escape(d.get('deliveryDestinationType', 'N/A'))}</td></tr>"
                      html += "</table>"
                  else:
                      html += """<br><span style="color: #FFA500; font-weight: bold;">No CloudWatch Vended Logs delivery configured for AI Agent event logs.</span>"""
                      html += """<p><em>Note: This checks for AI Agent-specific event log delivery (TRANSCRIPT_AGENTIC_MESSAGE, TRANSCRIPT_SELF_SERVICE_MESSAGE, etc.),
                          not standard Connect contact flow logging which may be enabled separately at the instance level.</em></p>"""
                      html += """<h4>Recommendation</h4><ul>
                          <li>Enable AI Agent event logging via CloudWatch Vended Logs delivery for the assistant ARN.</li>
                          <li>This provides granular AI agent observability: tool invocation traces, LLM token usage, session analytics, intent detection, and recommendation tracking.</li>
                          <li>Standard contact flow logging (if enabled) does not capture these AI agent-specific events.</li>
                          <li>Refer <a href="https://docs.aws.amazon.com/connect/latest/adminguide/monitor-ai-agents.html" target="_blank">documentation</a>.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"P1 Error: {e}")
                  return html + f"<br>Error checking AI agent logging: {escape(str(e))}"
          
          """Q2: Q in Connect Hard Limits"""
