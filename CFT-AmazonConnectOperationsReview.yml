# CloudFormation template for Amazon Connect Operational Review
AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Amazon Connect Operational Review with embedded Lambda code. Please use us-east-1 to import this template file.'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Amazon Connect Operational Review Configuration"
        Parameters:
          - AmazonConnectInstanceARN
          - AmazonConnectCloudWatchLogGroup
          - AmazonS3ForReports
      - Label:
          default: "AI Agent Monitoring Configuration (Optional)"
        Parameters:
          - AmazonConnectAssistantId
          - EnableAIAgentChecks
    ParameterLabels:
      AmazonConnectInstanceARN:
        default: "Amazon Connnect Instance ARN"
      AmazonConnectCloudWatchLogGroup:
        default: "Amazon Connect CloudWatch LogGroup"
      AmazonS3ForReports:
        default: "Amazon S3 bucket name"
      AmazonConnectAssistantId:
        default: "Q in Connect Assistant ID (optional)"
      EnableAIAgentChecks:
        default: "Enable AI Agent Checks"
        
Parameters:
  AmazonConnectInstanceARN:
    Type: String
    Description: 'The ARN of your Amazon Connect instance for this review. Example: arn:aws:connect:<region>:<account-id>:instance/<resource-id>'
  
  AmazonConnectCloudWatchLogGroup:
    Type: String
    Description: 'The ARN of your Amazon Connect instance CloudWatch Log Group resource. Example: /aws/connect/connect-instance-name'
  
  AmazonS3ForReports:
    Type: String
    Description: 'Existing S3 Bucket name for uploading Operational review reports'
    MinLength: 3
    MaxLength: 63
    ConstraintDescription: 'Must be a valid S3 bucket name'

  AmazonConnectAssistantId:
    Type: String
    Description: 'Q in Connect Assistant ID (leave blank to auto-discover from Connect instance). Example: 12345678-abcd-1234-efgh-123456789012'
    Default: ''

  EnableAIAgentChecks:
    Type: String
    Description: 'Enable AI Agent monitoring checks (requires Q in Connect / Amazon Connect AI Agents)'
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

Resources:
  # IAM Role for Lambda execution with required permissions
  AmazonConnectOperationalReviewLambdaExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonConnectReadOnlyAccess
        - arn:aws:iam::aws:policy/AWSCloudTrail_ReadOnlyAccess
        - arn:aws:iam::aws:policy/ServiceQuotasReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        
      Policies:
      - PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Resource: "*"
            Action: "mobiletargeting:PhoneNumberValidate"
            Effect: "Allow"
            Sid: "VisualEditor0"
        PolicyName: "PinpointPhoneNumberValidateReadOnlyAccess"
      - PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Resource: !Sub 'arn:aws:s3:::${AmazonS3ForReports}/*'
            Action: "s3:PutObject"
            Effect: "Allow"
            Sid: "VisualEditor0"
        PolicyName: "PutObjectToS3-Review"
      - PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Resource: "*"
            Action:
              - "qconnect:ListAssistants"
              - "qconnect:GetAssistant"
              - "qconnect:ListAIAgents"
              - "qconnect:GetAIAgent"
              - "qconnect:ListAIAgentVersions"
              - "qconnect:ListAIPrompts"
              - "qconnect:GetAIPrompt"
              - "qconnect:ListAIGuardrails"
              - "qconnect:GetAIGuardrail"
              - "qconnect:ListAIPromptVersions"
              - "qconnect:ListKnowledgeBases"
              - "qconnect:GetKnowledgeBase"
              - "qconnect:ListContents"
              - "qconnect:ListAssistantAssociations"
              - "wisdom:List*"
              - "wisdom:Get*"
              - "wisdom:Search*"
            Effect: "Allow"
            Sid: "QConnectReadAccess"
        PolicyName: "QConnectReadOnlyAccess"
      - PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Resource: "*"
            Action:
              - "logs:DescribeDeliveries"
              - "logs:DescribeDeliverySources"
              - "logs:DescribeDeliveryDestinations"
              - "connect:ListIntegrationAssociations"
              - "connect:ListInstanceStorageConfigs"
              - "connect:ListSecurityProfiles"
              - "connect:DescribeSecurityProfile"
              - "connect:ListSecurityProfileApplications"
              - "connect:ListLambdaFunctions"
            Effect: "Allow"
            Sid: "AIAgentSupportAccess"
        PolicyName: "AIAgentSupportReadOnlyAccess"

  # Lambda function with embedded code
  LambdaFunctionAmazonConnectOperationalReviewauto:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "amazonConnectOperationalReview-auto"
      Handler: "index.lambda_handler"
      Role: !GetAtt AmazonConnectOperationalReviewLambdaExecutionRole.Arn
      Runtime: python3.13
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          CONNECT_INSTANCE_ARN: !Ref AmazonConnectInstanceARN
          CONNECT_CW_LOG_GROUP: !Ref AmazonConnectCloudWatchLogGroup
          S3_REPORTING_BUCKET: !Ref AmazonS3ForReports
          ASSISTANT_ID: !Ref AmazonConnectAssistantId
          ENABLE_AI_CHECKS: !Ref EnableAIAgentChecks
      Code:
        ZipFile: |
          import boto3
