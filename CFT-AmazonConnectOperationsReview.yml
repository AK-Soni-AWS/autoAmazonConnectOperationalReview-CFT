                      logger.warning(f"[O1] Could not list security profiles: {sp_err}")
          
                  html += f"<br>Found {len(agents)} AI agent(s).<br><br>"
                  html += """<table style="width: 100%"><tr><th>Agent Name</th><th>Type</th><th>Status</th><th>Tools</th><th>Security Profile</th></tr>"""
                  for agent in agents:
                      a_id = agent.get('aiAgentId', '')
                      try:
                          detail = qconnect_client.get_ai_agent(assistantId=assistant_id, aiAgentId=a_id)
