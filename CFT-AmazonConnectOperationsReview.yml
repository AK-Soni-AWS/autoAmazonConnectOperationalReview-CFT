                  try:
                      # Bulk fetch all applied quotas (with retry)
                      applied_quotas = {}
                      for attempt in range(3):
                          try:
                              paginator_applied = service_quotas_client.get_paginator('list_service_quotas')
                              for page in paginator_applied.paginate(ServiceCode=service_code):
                                  for q in page.get('Quotas', []):
                                      applied_quotas[q['QuotaCode']] = q
                              break
                          except Exception as retry_e:
                              logger.warning(f"list_service_quotas attempt {attempt+1} failed: {retry_e}")
                              time.sleep(2 ** attempt)
                      logger.info(f"Fetched {len(applied_quotas)} applied quotas")

                      time.sleep(1)

                      # Bulk fetch all default quotas (with retry)
                      default_quotas = {}
                      for attempt in range(3):
                          try:
                              paginator_default = service_quotas_client.get_paginator('list_aws_default_service_quotas')
                              for page in paginator_default.paginate(ServiceCode=service_code):
                                  for q in page.get('Quotas', []):
