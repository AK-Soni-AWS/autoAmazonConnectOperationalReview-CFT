                  for a in assistants:
                      logger.info(f"[Q2] Assistant: id={a.get('assistantId')}, name={a.get('name')}, type={a.get('type')}, status={a.get('status')}")
          
                  kb_associations = []
                  try:
                      assoc_resp = qconnect_client.list_assistant_associations(assistantId=assistant_id, maxResults=100)
                      kb_associations = [a for a in assoc_resp.get('assistantAssociationSummaries', []) if a.get('associationType') == 'KNOWLEDGE_BASE']
                  except Exception as e:
                      logger.warning(f"Could not list assistant associations: {e}")
          
                  html += """<br><table style="width: 50%">
                      <tr><th>Resource</th><th>Current</th><th>Limit</th><th>Usage %</th></tr>"""
                  # Assistants per account (limit 5, not adjustable)
                  asst_pct = round(total_assistants / 5 * 100, 1)
                  html += f'<tr><td>Assistants per account</td><td>{total_assistants}</td><td>5</td><td style="background-color: {get_color_by_percentage(asst_pct)};">{asst_pct}%</td></tr>'
                  # KBs per assistant (limit 10)
                  kb_count = len(kb_associations)
                  kb_pct = round(kb_count / 10 * 100, 1)
                  html += f'<tr><td>Knowledge Bases per assistant</td><td>{kb_count}</td><td>10</td><td style="background-color: {get_color_by_percentage(kb_pct)};">{kb_pct}%</td></tr>'
                  # Assistant associations per instance (limit 1, not adjustable)
                  html += f'<tr><td>Assistant per Connect instance</td><td>1</td><td>1</td><td style="background-color: {get_color_by_percentage(100)};">100%</td></tr>'
                  html += "</table>"
          
                  # Check article counts per KB
                  if kb_associations:
                      html += "<br><b>Knowledge Base Article Counts</b><br>"
                      html += """<table style="width: 60%"><tr><th>Knowledge Base ID</th><th>Articles</th><th>Limit</th><th>Usage %</th></tr>"""
                      for assoc in kb_associations:
                          kb_id = assoc.get('associationData', {}).get('knowledgeBaseAssociation', {}).get('knowledgeBaseId', '')
                          if kb_id:
                              try:
                                  contents = paginate_api_call(qconnect_client.list_contents, 'contentSummaries', knowledgeBaseId=kb_id, maxResults=100)
                                  article_count = len(contents)
                                  art_pct = round(article_count / 5000 * 100, 1)
                                  html += f'<tr><td>{escape(kb_id)}</td><td>{article_count}</td><td>5000</td><td style="background-color: {get_color_by_percentage(art_pct)};">{art_pct}%</td></tr>'
                              except Exception:
                                  html += f'<tr><td>{escape(kb_id)}</td><td>N/A</td><td>5000</td><td>N/A</td></tr>'
                      html += "</table>"
          
                  html += """<h4>Key Constraints</h4><ul>
                      <li>1 assistant association per Connect instance (not adjustable) - plan architecture accordingly.</li>
                      <li>5,000 articles per knowledge base (not adjustable) - prioritize by relevance, retire stale content.</li>
                      <li>5 GB maximum knowledge base size (not adjustable).</li>
                      <li>SendMessage API: 1-2 TPS depending on region.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"Q2 Error: {e}")
                  return html + f"<br>Error checking Q in Connect limits: {escape(str(e))}"
          
          """R3: Knowledge Base Association & Sync Health"""
          def check_kb_sync_health(assistant_id):
              html = "<b>Knowledge Base Sync Health</b><br>"
              logger.info(f"[R1] Starting KB Sync Health check for assistant_id={assistant_id}")
              try:
                  assoc_resp = qconnect_client.list_assistant_associations(assistantId=assistant_id, maxResults=100)
                  all_associations = assoc_resp.get('assistantAssociationSummaries', [])
                  logger.info(f"[R1] list_assistant_associations returned {len(all_associations)} total association(s)")
                  for a in all_associations:
                      logger.info(f"[R1] Association: type={a.get('associationType')}, id={a.get('assistantAssociationId')}")
                  kb_associations = [a for a in all_associations if a.get('associationType') == 'KNOWLEDGE_BASE']
                  logger.info(f"[R1] Found {len(kb_associations)} KNOWLEDGE_BASE association(s)")
          
                  if not kb_associations:
                      html += "<br>No knowledge bases associated with this assistant."
                      html += """<h4>Recommendation</h4><ul><li>Associate at least one knowledge base with the assistant for AI agent retrieval capabilities.</li></ul>"""
                      return html
          
                  html += f"<br>Found {len(kb_associations)} knowledge base association(s).<br><br>"
                  html += """<table style="width: 90%"><tr><th>KB Name</th><th>KB ID</th><th>Status</th><th>Last Content Modified</th><th>Time Since Last Update</th><th>Freshness</th></tr>"""
                  review_kbs = []
                  for assoc in kb_associations:
                      kb_id = assoc.get('associationData', {}).get('knowledgeBaseAssociation', {}).get('knowledgeBaseId', '')
                      if not kb_id:
                          continue
                      try:
                          kb_resp = qconnect_client.get_knowledge_base(knowledgeBaseId=kb_id)
                          kb = kb_resp.get('knowledgeBase', {})
                          kb_name = escape(kb.get('name', 'N/A'))
                          kb_status = escape(kb.get('status', 'N/A'))
                          last_modified = kb.get('lastContentModificationTime')
                          if last_modified:
                              hours_since = (datetime.now(timezone.utc) - last_modified).total_seconds() / 3600
                              days_since = hours_since / 24
                              if days_since >= 1:
                                  time_str = f"{days_since:.1f} days"
                              else:
                                  time_str = f"{hours_since:.1f} hours"
                              # Freshness is informational, not a hard pass/fail
                              if hours_since <= 24:
                                  freshness = "Recent"
                                  color = "#00FF00"
                              elif hours_since <= 168:
                                  freshness = "Review"
                                  color = "#FFA500"
                                  review_kbs.append(kb_name)
                              else:
                                  freshness = "Review"
                                  color = "#FFA500"
                                  review_kbs.append(kb_name)
                              last_mod_str = last_modified.strftime("%Y-%m-%d %H:%M UTC")
                          else:
                              time_str = "Unknown"
                              freshness = "Unknown"
                              color = "#FFA500"
                              last_mod_str = "Never"
                              review_kbs.append(kb_name)
                          html += f'<tr><td>{kb_name}</td><td>{escape(kb_id)}</td><td>{kb_status}</td><td>{last_mod_str}</td><td>{time_str}</td><td style="background-color: {color};">{freshness}</td></tr>'
                      except Exception as kb_err:
                          html += f'<tr><td>N/A</td><td>{escape(kb_id)}</td><td>ERROR</td><td>N/A</td><td>N/A</td><td style="background-color: #FFA500;">ERROR</td></tr>'
                          logger.warning(f"Error getting KB {kb_id}: {kb_err}")
                  html += "</table>"
                  html += """<p><em>Note: The required sync frequency depends on how often your source content changes.
                      Verify that the last content modification time aligns with your expected update schedule.
                      If source content has changed but the knowledge base has not been updated, check your sync configuration.</em></p>"""
                  if review_kbs:
                      html += f"""<h4>Recommendation</h4><ul>
                          <li>Knowledge base(s) to review: {', '.join(review_kbs)}. Verify content is up to date with your source.</li>
                          <li>Default sync interval is 1 hour. Options: every 1 hour, every 3 hours, or daily. For S3 sources, sync is triggered by S3 object events.</li>
                          <li>Consider setting a CloudWatch alarm on <code>RecordsFailed &gt; 0</code> in <code>AWS/AppIntegrations</code> namespace to detect sync failures.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"R1 Error: {e}")
                  return html + f"<br>Error checking KB sync health: {escape(str(e))}"
          
          """P8: Connect Contact Flow Errors"""
          def check_flow_errors(instance_id, days_back):
              html = "<b>Contact Flow Errors &amp; Fatal Errors</b><br>"
              try:
                  end_time = datetime.utcnow()
                  start_time = end_time - timedelta(days=days_back)
                  # Check ContactFlowFatalErrors
                  fatal_resp = cloudwatch_client.get_metric_statistics(
                      Namespace='AWS/Connect', MetricName='ContactFlowFatalErrors',
                      Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}],
                      StartTime=start_time, EndTime=end_time, Period=86400, Statistics=['Sum'])
                  fatal_dps = fatal_resp.get('Datapoints', [])
                  total_fatal = int(sum(d.get('Sum', 0) for d in fatal_dps))
          
                  # Check ContactFlowErrors
                  error_resp = cloudwatch_client.get_metric_statistics(
                      Namespace='AWS/Connect', MetricName='ContactFlowErrors',
                      Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}],
                      StartTime=start_time, EndTime=end_time, Period=86400, Statistics=['Sum'])
                  error_dps = error_resp.get('Datapoints', [])
                  total_errors = int(sum(d.get('Sum', 0) for d in error_dps))
          
                  fatal_color = "#FF0000" if total_fatal > 0 else "#00FF00"
                  error_color = "#FF0000" if total_errors > 50 else "#FFA500" if total_errors > 0 else "#00FF00"
          
                  html += f"""<br><table style="width: 50%">
                      <tr><th>Metric</th><th>Count ({days_back} days)</th><th>Status</th></tr>
                      <tr><td>Contact Flow Fatal Errors</td><td>{total_fatal}</td><td style="background-color: {fatal_color};">{'CRITICAL' if total_fatal > 0 else 'OK'}</td></tr>
                      <tr><td>Contact Flow Errors</td><td>{total_errors}</td><td style="background-color: {error_color};">{'CRITICAL' if total_errors > 50 else 'WARNING' if total_errors > 0 else 'OK'}</td></tr>
                      </table>"""
                  if total_fatal > 0 or total_errors > 50:
                      html += """<h4>Recommendation</h4><ul>
                          <li>Fatal errors indicate flow execution failures - check Lambda timeouts, Bedrock throttling, and missing error branches.</li>
                          <li>Correlate with Bedrock latency (P6) and throttling (P7) findings for root cause.</li>
                          <li>Set CloudWatch alarm: <code>ContactFlowFatalErrors &gt; 0</code> for any 5-minute window.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"P8 Error: {e}")
                  return html + f"<br>Error checking flow errors: {escape(str(e))}"
          
          """S3: KMS Encryption for Connect Storage"""
          def check_connect_storage_encryption(instance_id):
              html = "<b>KMS Encryption for Connect Storage</b><br>"
              logger.info(f"[S3] Starting Connect Storage Encryption check for instance_id={instance_id}")
              try:
                  resource_types = ['CALL_RECORDINGS', 'CHAT_TRANSCRIPTS', 'SCHEDULED_REPORTS', 'MEDIA_STREAMS', 'AGENT_EVENTS']
                  html += """<br><table style="width: 70%"><tr><th>Storage Type</th><th>Encryption Type</th><th>KMS Key</th><th>Status</th></tr>"""
                  has_issues = False
                  for res_type in resource_types:
                      try:
                          resp = connect_client.list_instance_storage_configs(
                              InstanceId=instance_id,
                              ResourceType=res_type
                          )
                          configs = resp.get('StorageConfigs', [])
                          if not configs:
                              html += f'<tr><td>{escape(res_type)}</td><td>Not configured</td><td>N/A</td><td style="background-color: #CCCCCC;">N/A</td></tr>'
                              continue
                          for config in configs:
                              enc = config.get('KinesisVideoStreamConfig', {}).get('EncryptionConfig', {}) or \
                                    config.get('S3Config', {}).get('EncryptionConfig', {}) or \
                                    config.get('KinesisStreamConfig', {}).get('EncryptionConfig', {}) or \
                                    config.get('KinesisFirehoseConfig', {}).get('EncryptionConfig', {}) or {}
                              enc_type = enc.get('EncryptionType', 'Not set')
                              key_id = enc.get('KeyId', 'N/A')
                              if enc_type == 'KMS' and key_id and not key_id.startswith('alias/aws/'):
                                  status = 'CMK'
                                  color = '#00FF00'
                              elif enc_type == 'KMS':
                                  status = 'AWS Managed'
                                  color = '#FFA500'
                                  has_issues = True
                              else:
                                  status = 'No KMS'
                                  color = '#FFA500'
                                  has_issues = True
                              masked_key = (key_id[:40] + '...') if len(key_id) > 40 else key_id
                              html += f'<tr><td>{escape(res_type)}</td><td>{escape(enc_type)}</td><td>{escape(masked_key)}</td><td style="background-color: {color};">{status}</td></tr>'
                      except ClientError as e:
                          if e.response['Error']['Code'] == 'ResourceNotFoundException':
                              html += f'<tr><td>{escape(res_type)}</td><td>Not configured</td><td>N/A</td><td style="background-color: #CCCCCC;">N/A</td></tr>'
                          else:
                              html += f'<tr><td>{escape(res_type)}</td><td colspan="3">Error: {escape(e.response["Error"]["Code"])}</td></tr>'
                  html += "</table>"
                  if has_issues:
                      html += """<h4>Recommendation</h4><ul>
                          <li>Use customer-managed KMS keys for all storage types for full control over key rotation and access auditing.</li>
                          <li>Refer <a href="https://docs.aws.amazon.com/connect/latest/adminguide/encryption-at-rest.html" target="_blank">documentation</a>.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"S3 Error: {e}")
                  return html + f"<br>Error checking storage encryption: {escape(str(e))}"
          
          """Q2: Lambda Integration Limits"""
          def check_lambda_integration_limits(instance_id):
              html = "<b>Lambda Integration Limits</b><br>"
              logger.info(f"[Q2] Starting Lambda Integration Limits check for instance_id={instance_id}")
              try:
                  lambda_functions = []
                  next_token = None
                  while True:
                      kwargs = {'InstanceId': instance_id, 'MaxResults': 25}
                      if next_token:
                          kwargs['NextToken'] = next_token
                      resp = connect_client.list_lambda_functions(**kwargs)
                      lambda_functions.extend(resp.get('LambdaFunctions', []))
                      next_token = resp.get('NextToken')
                      if not next_token:
                          break
                  total = len(lambda_functions)
                  logger.info(f"[Q2] Found {total} Lambda function(s)")
                  limit = 50
                  pct = round(total / limit * 100, 1)
                  color = get_color_by_percentage(pct)
                  html += f"""<br><table style="width: 50%">
                      <tr><th>Resource</th><th>Current</th><th>Limit</th><th>Usage %</th></tr>
                      <tr><td>Lambda functions per instance</td><td>{total}</td><td>{limit}</td><td style="background-color: {color};">{pct}%</td></tr>
                      </table>"""
                  if lambda_functions:
                      html += "<br><b>Associated Lambda Functions:</b><br>"
                      html += """<table style="width: 80%"><tr><th>#</th><th>Lambda Function ARN</th></tr>"""
                      for i, fn_arn in enumerate(lambda_functions, 1):
