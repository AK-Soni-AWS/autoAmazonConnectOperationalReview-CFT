                  html += "</table>"
              else:
                  html += '<br><p style="color:#22c55e; font-weight:bold;">&#9989; All recommended alarms are configured.</p>'

              # Found alarms
              if found:
                  triggered_count = sum(1 for f in found if f.get("alarm_state") == "ALARM")
