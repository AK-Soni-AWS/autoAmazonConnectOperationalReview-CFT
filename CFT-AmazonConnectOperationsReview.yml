                      </tr>"""
                  html += "</table>"

              # Recommendations
              html += get_recommendation("alarm_validation")
              html += """</div>"""

              return html


          def lambda_handler(event, context):
              try:
                  cfs_limit=""
                  rps_limit = ""
                  queues_limit = ""
                  sec_profiles_limit = ""
                  users_limit = ""
                  days_back = 30
                  hasConnectReplica = "no"
          
                  s3_reporting_bucket = os.environ.get('S3_REPORTING_BUCKET')
                  connect_cloudwatch_log_group = os.environ.get('CONNECT_CW_LOG_GROUP')
          
                  logger.info(f"Execute Automated Amazon Connect Operational Review: {datetime_string}")
                  lambda_exec_start_time = time.time()
          
                  # Far back to evaluate logs
                  days_back = 14
                  end_time = datetime.utcnow()
                  start_time = end_time - timedelta(days=days_back)
          
                  # Parse Amazon connect instance info from environment variables
                  instance_arn = os.environ.get('CONNECT_INSTANCE_ARN')
                  parsed = parse_connect_instance_arn(instance_arn)
                  instance_id = str(parsed['instance_id'])
                  aws_region = str(parsed['aws_region'])
                  account_id = str(parsed['account_id'])
                  logger.info (f"Instance Details parsed from env variables: {instance_arn}, AWS Region: {aws_region}, Account ID: {account_id}")

                  # Early AI Agent discovery (needed before pillar sections)
                  enable_ai_checks = os.environ.get('ENABLE_AI_CHECKS', 'true').lower() == 'true'
                  assistant_id = os.environ.get('ASSISTANT_ID', '').strip()
                  if enable_ai_checks:
                      if not assistant_id:
                          assistant_id = discover_assistant_id(instance_id)
                      logger.info(f"[AI-CHECKS] assistant_id={'found: ' + assistant_id if assistant_id else 'not found'}")
                  else:
                      assistant_id = None
                      logger.info("[AI-CHECKS] AI Agent checks disabled")

                  # Helper to determine check status from HTML output
                  def _ai_status(html_result, warn_keywords=None, fail_keywords=None):
                      warn_keywords = warn_keywords or ['WARNING', 'color: #FFA500', 'color: red', 'CRITICAL', 'missing', 'Missing', 'No guardrail', 'No CloudWatch', 'No KMS', 'Review']
                      fail_keywords = fail_keywords or ['CRITICAL', 'color: red']
                      for kw in fail_keywords:
                          if kw in html_result:
                              return 'fail'
                      for kw in warn_keywords:
                          if kw in html_result:
                              return 'warn'
                      return 'pass'

                  #Describe Instance and create the intial html output
                  result = describe_connect_to_html(instance_id)
                  if isinstance(result, tuple):
                      html_output, instance_data = result
                  else:
                      html_output = result
                      instance_data = None
                  if isinstance(html_output, dict):
                      return html_output

                  # ── Summary tracker: collects pass/fail/warn for each check ──
                  checks = []  # Each entry: {"pillar": str, "check": str, "status": "pass"|"fail"|"warn", "detail": str}

                  # Summary placeholder is embedded in describe_connect_to_html output
                  SUMMARY_PLACEHOLDER = "<!--SUMMARY_PLACEHOLDER-->"

                  #Module runtime duration
                  duration = time.time() - lambda_exec_start_time 
                  logger.info(f"Describe Amazon Connect Module execution time: {duration}")
                  lambda_exec_intermediate_time = time.time()

                  # ── Data Storage & Streaming Configuration (under Instance Information) ──
                  logger.debug("Fetching Data Storage & Streaming configuration...")
                  RESOURCE_TYPES = [
                      'CHAT_TRANSCRIPTS', 'CALL_RECORDINGS', 'SCHEDULED_REPORTS',
                      'MEDIA_STREAMS', 'CONTACT_TRACE_RECORDS', 'AGENT_EVENTS',
                      'REAL_TIME_CONTACT_ANALYSIS_SEGMENTS', 'ATTACHMENTS',
                      'CONTACT_EVALUATIONS', 'SCREEN_RECORDINGS',
                      'REAL_TIME_CONTACT_ANALYSIS_CHAT_SEGMENTS',
                      'REAL_TIME_CONTACT_ANALYSIS_VOICE_SEGMENTS', 'EMAIL_MESSAGES',
                  ]
                  storage_rows = ""
                  streaming_rows = ""
                  unencrypted_s3_buckets = []
                  s3_total_configs = 0  # Total S3 storage configs found
                  kds_stream_arns = []
                  streaming_encryption_info = []  # Track all streaming configs for encryption audit
                  for rtype in RESOURCE_TYPES:
                      try:
                          time.sleep(0.5)
                          configs = []
                          kwargs_sc = {'InstanceId': instance_id, 'ResourceType': rtype}
                          while True:
                              resp = connect_client.list_instance_storage_configs(**kwargs_sc)
                              configs.extend(resp.get('StorageConfigs', []))
                              token = resp.get('NextToken')
                              if not token:
                                  break
                              kwargs_sc['NextToken'] = token

                          if not configs:
                              storage_rows += f"""<tr><td>{escape(rtype.replace('_', ' ').title())}</td><td style="text-align:center;">Not configured</td><td style="text-align:center;">-</td><td style="text-align:center;">-</td></tr>"""
                          else:
                              for cfg in configs:
                                  stype = cfg.get('StorageType', 'N/A')
                                  destination = "-"
                                  encryption = "None"
                                  if stype == 'S3' and 'S3Config' in cfg:
                                      s3_total_configs += 1
                                      s3c = cfg['S3Config']
                                      destination = f"s3://{s3c.get('BucketName', '')}/{s3c.get('BucketPrefix', '')}"
                                      enc = s3c.get('EncryptionConfig')
                                      if enc:
                                          encryption = f"KMS: ...{enc.get('KeyId', '')[-12:]}"
                                      else:
                                          unencrypted_s3_buckets.append({
                                              'resource_type': rtype.replace('_', ' ').title(),
                                              'bucket': s3c.get('BucketName', 'N/A'),
                                          })
                                  elif stype == 'KINESIS_VIDEO_STREAM' and 'KinesisVideoStreamConfig' in cfg:
                                      kvc = cfg['KinesisVideoStreamConfig']
                                      kvs_retention = kvc.get('RetentionPeriodHours', 0)
                                      destination = f"KVS prefix: {kvc.get('Prefix', '')} (retention: {kvs_retention}h)"
                                      enc = kvc.get('EncryptionConfig')
                                      has_enc = bool(enc)
                                      if enc:
                                          encryption = f"KMS: ...{enc.get('KeyId', '')[-12:]}"
                                      streaming_encryption_info.append({
                                          'resource_type': rtype.replace('_', ' ').title(),
                                          'stream_type': 'Kinesis Video Stream',
                                          'destination': destination,
                                          'encrypted': has_enc,
                                          'retention_hours': kvs_retention,
                                      })
                                      streaming_rows += f"""<tr><td>{escape(rtype.replace('_', ' ').title())}</td><td>{escape(stype)}</td><td>{escape(destination)}</td><td>{escape(encryption)}</td></tr>"""
                                      continue
                                  elif stype == 'KINESIS_STREAM' and 'KinesisStreamConfig' in cfg:
                                      destination = cfg['KinesisStreamConfig'].get('StreamArn', '')
                                      kds_stream_arns.append(destination)
                                      streaming_encryption_info.append({
                                          'resource_type': rtype.replace('_', ' ').title(),
                                          'stream_type': 'Kinesis Data Stream',
                                          'destination': destination.split('/')[-1] if '/' in destination else destination,
                                          'encrypted': None,  # KDS encryption is managed at stream level, not in Connect config
                                      })
                                      streaming_rows += f"""<tr><td>{escape(rtype.replace('_', ' ').title())}</td><td>{escape(stype)}</td><td style="word-break:break-all;">{escape(destination)}</td><td>-</td></tr>"""
                                      continue
                                  elif stype == 'KINESIS_FIREHOSE' and 'KinesisFirehoseConfig' in cfg:
                                      destination = cfg['KinesisFirehoseConfig'].get('FirehoseArn', '')
                                      streaming_encryption_info.append({
                                          'resource_type': rtype.replace('_', ' ').title(),
                                          'stream_type': 'Kinesis Firehose',
                                          'destination': destination.split('/')[-1] if '/' in destination else destination,
                                          'encrypted': None,  # Firehose encryption is managed at delivery stream level
                                      })
                                      streaming_rows += f"""<tr><td>{escape(rtype.replace('_', ' ').title())}</td><td>{escape(stype)}</td><td style="word-break:break-all;">{escape(destination)}</td><td>-</td></tr>"""
                                      continue

                                  storage_rows += f"""<tr><td>{escape(rtype.replace('_', ' ').title())}</td><td style="text-align:center;">{escape(stype)}</td><td style="word-break:break-all;">{escape(destination)}</td><td>{escape(encryption)}</td></tr>"""
                      except Exception as e:
                          logger.debug(f"Could not fetch storage config for {rtype}: {e}")
                          storage_rows += f"""<tr><td>{escape(rtype.replace('_', ' ').title())}</td><td style="text-align:center;" colspan="3">Error: {escape(str(e)[:60])}</td></tr>"""

                  html_output += f"""
                      <div class="section" id="data-storage">
                          <h3>Data Storage Configuration</h3>
                          <table style="width: 100%; table-layout: fixed;">
                              <colgroup>
                                  <col style="width: 25%;"><col style="width: 15%;"><col style="width: 40%;"><col style="width: 20%;">
                              </colgroup>
                              <tr><th>Resource Type</th><th style="text-align:center;">Storage Type</th><th>Destination</th><th>Encryption</th></tr>
                              {storage_rows}
                          </table>
                      </div>"""

                  if streaming_rows:
                      html_output += f"""
                      <div class="section" id="data-streaming">
                          <h3>Data Streaming Configuration</h3>
                          <table style="width: 100%; table-layout: fixed;">
                              <colgroup>
                                  <col style="width: 25%;"><col style="width: 15%;"><col style="width: 40%;"><col style="width: 20%;">
                              </colgroup>
                              <tr><th>Resource Type</th><th>Stream Type</th><th>Destination</th><th>Encryption</th></tr>
                              {streaming_rows}
                          </table>
                      </div>"""

                  duration = time.time() - lambda_exec_intermediate_time
                  logger.info(f"Data Storage & Streaming Module execution time: {duration}")
