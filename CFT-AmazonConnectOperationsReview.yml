                          stream_enc_rows += f"""<tr><td>{escape(s['resource_type'])}</td><td>{escape(s['stream_type'])}</td><td>{escape(s['destination'])}</td><td>{status}</td><td style="text-align:center;">{retention}</td></tr>"""

