                  # Build security profile map with their MCP applications
                  sp_apps_map = {}
                  try:
                      sp_resp = connect_client.list_security_profiles(InstanceId=instance_id, MaxResults=100)
                      for sp in sp_resp.get('SecurityProfileSummaryList', []):
