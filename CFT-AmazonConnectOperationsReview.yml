          # Initialize Q in Connect client for AI Agent checks
          qconnect_client = boto3.client('qconnect')
          
          """Parse instance_id and aws_region from Amazon Connect instance ARN"""
          def parse_connect_instance_arn(instance_arn):
              """
                  ARN format: arn:aws:connect:region:account-id:instance/instance-id
          
              Args:
                  instance_arn (str): Amazon Connect instance ARN
          
              Returns:
                  dict: Contains instance_id, aws_region, account_id, and other components
              """
          
              if not instance_arn or not isinstance(instance_arn, str):
                  raise ValueError("Invalid ARN provided in envonment variable - CONNECT_INSTANCE_ARN")
          
              # Split ARN by colons
              arn_parts = instance_arn.split(':')
          
              if len(arn_parts) < 6 or arn_parts[0] != 'arn' or arn_parts[2] != 'connect':
                  raise ValueError(f"Invalid Connect instance ARN format: {instance_arn}")
          
              # Extract components
              aws_region = arn_parts[3]
              account_id = arn_parts[4]
              resource_part = arn_parts[5]  # instance/instance-id
          
              # Extract instance ID from resource part
              if not resource_part.startswith('instance/'):
                  raise ValueError(f"Invalid resource type in ARN: {resource_part}")
          
              instance_id = resource_part.split('/', 1)[1]
          
              return {
                  'instance_id': instance_id,
                  'aws_region': aws_region,
                  'account_id': account_id,
                  'service': arn_parts[2],
                  'partition': arn_parts[1],
                  'resource_type': 'instance',
                  'full_arn': instance_arn
              }
          
          def get_connect_service_quota(service_quotas_client, service_code, quota_code, context_id=None):
              """
              Get a single service quota name and value.
              Falls back to default if no instance-specific quota exists.
          
              Returns:
                  tuple: (quota_name, quota_value)
              """
              try:
                  params = {'ServiceCode': service_code, 'QuotaCode': quota_code}
                  if context_id:
                      params['ContextId'] = context_id
          
                  time.sleep(1)
                  response = service_quotas_client.get_service_quota(**params)
                  quota_name = response['Quota']['QuotaName']
                  quota_value = response['Quota']['Value']
                  quota_unit = response['Quota']['Unit']
                  logger.debug(f"  Retrieved quota {quota_name}: {quota_value} {quota_unit}")
          
                  return quota_name, quota_value
          
              except ClientError as e:
                  error_code = e.response['Error']['Code']
          
                  # Fall back to default quota (no context_id) for instance-specific errors
                  if error_code in ('NoSuchResourceException', 'IllegalArgumentException') and context_id:
                      try:
                          response = service_quotas_client.get_service_quota(
                              ServiceCode=service_code, QuotaCode=quota_code
                          )
                          return response['Quota']['QuotaName'], response['Quota']['Value']
                      except ClientError as fallback_error:
                          logger.error(f"  Fallback error for {quota_code}: {fallback_error.response['Error']['Code']}")
                          return quota_code, None
          
                  logger.error(f"  Error for {quota_code}: {error_code}")
                  return quota_name, None
          
          def get_color_by_percentage(percentage):
              """Return color code based on percentage value"""
              if percentage >= 98:
                  return "#FF0000"  # Red - Critical
              elif percentage >= 80:
                  return "#FFA500"  # Orange - Warning  
              #elif percentage >= 50:
              #    return "#FFFF00"  # Yellow - Caution
              else:
                  return "#00FF00"  # Green - Normal
          
          """Get Current utilization for Amazon Connect"""
          def old_current_utilization (instance_id, metric_name):

              try:
                  matched_value = metric_name
                  if matched_value == "ContactFlows":
