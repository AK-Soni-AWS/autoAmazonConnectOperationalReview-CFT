# CloudFormation template for Amazon Connect Operational Review
AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Amazon Connect Operational Review with embedded Lambda code. Please use us-east-1 to import this template file.'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Amazon Connect Operational Review Configuration"
        Parameters:
          - AmazonConnectInstanceARN
          - AmazonConnectCloudWatchLogGroup
          - AmazonS3ForReports
    ParameterLabels:
      AmazonConnectInstanceARN:
        default: "Amazon Connnect Instance ARN"
      AmazonConnectCloudWatchLogGroup:
        default: "Amazon Connect CloudWatch LogGroup"
      AmazonS3ForReports:
        default: "Amazon S3 bucket name"
        
Parameters:
  AmazonConnectInstanceARN:
    Type: String
    Description: 'The ARN of your Amazon Connect instance for this review. Example: arn:aws:connect:<region>:<account-id>:instance/<resource-id>'
  
  AmazonConnectCloudWatchLogGroup:
    Type: String
    Description: 'The ARN of your Amazon Connect instance CloudWatch Log Group resource. Example: /aws/connect/connect-instance-name'
  
  AmazonS3ForReports:
    Type: String
    Description: 'Existing S3 Bucket name for uploading Operational review reports'
    MinLength: 3
    MaxLength: 63
    ConstraintDescription: 'Must be a valid S3 bucket name'

Resources:
  # Boto3 Lambda Layer — auto-created to provide updated boto3 for Q in Connect AI Agent APIs
  # The default Lambda runtime boto3 (1.40.x) does not support orchestrationAIAgentConfiguration
  Boto3LayerBuilder:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-boto3-layer-builder'
      Description: 'Builds a boto3 Lambda Layer for Q in Connect API support'
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt AmazonConnectOperationalReviewLambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        ZipFile: |
          import subprocess, zipfile, os, json, urllib.request, shutil
          def handler(event, context):
              if event.get('RequestType') == 'Delete':
                  send_response(event, context, 'SUCCESS', {})
                  return
              try:
                  target = '/tmp/python'
                  if os.path.exists(target):
                      shutil.rmtree(target)
                  subprocess.check_call(['pip', 'install', 'boto3>=1.42.0', '-t', target, '--quiet', '--no-cache-dir'])
                  zip_path = '/tmp/boto3-layer.zip'
                  with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
                      for root, dirs, files in os.walk(target):
                          for f in files:
                              full = os.path.join(root, f)
                              arc = os.path.join('python', os.path.relpath(full, target))
                              zf.write(full, arc)
                  import boto3
                  client = boto3.client('lambda')
                  with open(zip_path, 'rb') as f:
                      resp = client.publish_layer_version(
                          LayerName=f"{os.environ.get('AWS_LAMBDA_FUNCTION_NAME', 'boto3')}-layer",
                          Description='boto3 latest for Q Connect AI Agent API support',
                          Content={'ZipFile': f.read()},
                          CompatibleRuntimes=['python3.13', 'python3.12', 'python3.11'])
                  layer_arn = resp['LayerVersionArn']
                  send_response(event, context, 'SUCCESS', {'LayerVersionArn': layer_arn})
              except Exception as e:
                  print(f"Error: {e}")
                  send_response(event, context, 'FAILED', {'Error': str(e)})
          def send_response(event, context, status, data):
              body = json.dumps({'Status': status, 'Reason': f'See CW Log: {context.log_stream_name}',
                  'PhysicalResourceId': context.log_stream_name, 'StackId': event['StackId'],
                  'RequestId': event['RequestId'], 'LogicalResourceId': event['LogicalResourceId'], 'Data': data})
              urllib.request.urlopen(urllib.request.Request(event['ResponseURL'], data=body.encode(), method='PUT',
                  headers={'Content-Type': 'application/json'}))

  Boto3LayerCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt Boto3LayerBuilder.Arn

