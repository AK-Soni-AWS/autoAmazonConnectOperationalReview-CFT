                      html += """<h4>Recommendation</h4><ul><li>Create self-service and/or agent-assist AI agents in the Connect AI agent designer.</li>
                          <li>Refer <a href="https://docs.aws.amazon.com/connect/latest/adminguide/ai-agents.html" target="_blank">documentation</a>.</li></ul>"""
