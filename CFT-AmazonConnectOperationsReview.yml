                      for gd in guardrail_details:
                          yes = '<span style="color: green;">&#10003;</span>'
                          no = '<span style="color: red;">&#10007;</span>'
                          html += f"""<tr><td>{escape(gd['name'])}</td><td>{escape(gd['status'])}</td><td>{escape(gd['visibility'])}</td>
                              <td style="text-align:center;">{yes if gd['content_filter'] else no}</td>
                              <td style="text-align:center;">{yes if gd['topic_policy'] else no}</td>
                              <td style="text-align:center;">{yes if gd['pii_filter'] else no}</td>
                              <td style="text-align:center;">{yes if gd['word_filter'] else no}</td>
                              <td style="text-align:center;">{yes if gd['grounding'] else no}</td></tr>"""
                      html += "</table>"
          
                      # Check for missing critical filters
                      missing_checks = []
                      for gd in guardrail_details:
                          if gd['visibility'] == 'PUBLISHED':
                              if not gd['content_filter']:
                                  missing_checks.append(f"'{gd['name']}' is missing <strong>Content Filter</strong> (hate, insult, sexual, violence)")
                              if not gd['pii_filter']:
                                  missing_checks.append(f"'{gd['name']}' is missing <strong>PII Filter</strong> (credit cards, SSNs, emails)")
                              if not gd['topic_policy']:
                                  missing_checks.append(f"'{gd['name']}' is missing <strong>Denied Topics</strong> (off-topic, competitor mentions)")
                              if not gd['grounding']:
                                  missing_checks.append(f"'{gd['name']}' is missing <strong>Contextual Grounding</strong> (hallucination prevention)")
                      if missing_checks:
                          html += '<br><span style="color: #FFA500; font-weight: bold;">Missing critical guardrail filters detected:</span><ul>'
                          for mc in missing_checks:
                              html += f"<li>{mc}</li>"
                          html += "</ul>"
          
                  # --- Part 2: Check which AI agents have guardrails associated ---
                  # Check BOTH $LATEST (draft/SAVED) and PUBLISHED versions of each agent.
                  html += "<br><b>AI Agent Guardrail Association</b><br>"
                  agents = paginate_api_call(qconnect_client.list_ai_agents, 'aiAgentSummaries', assistantId=assistant_id, maxResults=100)
                  agents_with_guardrail_published = []
                  agents_with_guardrail_draft_only = []
                  agents_without_guardrail = []
          
                  for agent in agents:
                      a_id = agent.get('aiAgentId', '')
                      a_name = agent.get('name', 'N/A')
                      a_visibility = agent.get('visibilityStatus', '')
          
                      def extract_guardrail_id(agent_data):
                          config = agent_data.get('configuration', {})
                          orch = config.get('orchestrationAIAgentConfiguration', {})
                          # Primary key: orchestrationAIGuardrailId (the actual field name)
                          g_id = orch.get('orchestrationAIGuardrailId', '')
                          if not g_id:
                              g_id = orch.get('guardrailId', '')
                          if not g_id:
                              ss = config.get('selfServiceAIAgentConfiguration', {})
                              g_id = ss.get('orchestrationAIGuardrailId', '') or ss.get('guardrailId', '')
                          # Strip version suffix (e.g., "uuid:1" -> "uuid") for display
                          return g_id
          
                      try:
                          # Get the agent detail ($LATEST)
                          latest_resp = qconnect_client.get_ai_agent(assistantId=assistant_id, aiAgentId=a_id)
                          latest_agent = latest_resp.get('aiAgent', {})
                          latest_guardrail = extract_guardrail_id(latest_agent)
                          latest_visibility = latest_agent.get('visibilityStatus', '')
                          logger.info(f"[S1] Agent '{a_name}': guardrail='{latest_guardrail}', "
                                     f"agent_visibility={a_visibility}, latest_visibility={latest_visibility}")
          
                          # Determine if the guardrail is in the PUBLISHED version:
                          # If the agent's visibilityStatus from list_ai_agents is PUBLISHED,
                          # then $LATEST IS the published version.
                          if latest_guardrail and a_visibility == 'PUBLISHED':
                              agents_with_guardrail_published.append({
                                  'name': a_name, 'guardrail_id': latest_guardrail, 'status': 'PUBLISHED'})
                              logger.info(f"[S1] Agent '{a_name}': guardrail PUBLISHED ✓")
                          elif latest_guardrail:
                              agents_with_guardrail_draft_only.append({
                                  'name': a_name, 'guardrail_id': latest_guardrail, 'status': 'DRAFT ONLY'})
                              logger.info(f"[S1] Agent '{a_name}': guardrail DRAFT ONLY")
                          else:
                              agents_without_guardrail.append(a_name)
                              logger.info(f"[S1] Agent '{a_name}': NO guardrail")
                      except Exception as agent_err:
                          logger.warning(f"[S1] Error checking agent {a_name}: {agent_err}")
                          agents_without_guardrail.append(a_name)
          
                  total_agents = len(agents)
                  pub_protected = len(agents_with_guardrail_published)
                  draft_only = len(agents_with_guardrail_draft_only)
                  unprotected = len(agents_without_guardrail)
                  html += f"<br>Total AI agents: {total_agents} | Guardrail published: {pub_protected} | Guardrail draft-only: {draft_only} | No guardrail: {unprotected}<br>"
          
                  if agents_with_guardrail_published or agents_with_guardrail_draft_only:
                      html += """<br><table style="width: 70%"><tr><th>AI Agent</th><th>Guardrail ID</th><th>Status</th></tr>"""
                      for a in agents_with_guardrail_published:
                          html += f'<tr><td>{escape(a["name"])}</td><td>{escape(a["guardrail_id"])}</td><td style="background-color: #00FF00;">PUBLISHED</td></tr>'
                      for a in agents_with_guardrail_draft_only:
                          html += f'<tr><td>{escape(a["name"])}</td><td>{escape(a["guardrail_id"])}</td><td style="background-color: #FFA500;">DRAFT ONLY (not live)</td></tr>'
                      html += "</table>"
                  if draft_only > 0:
                      html += f'<br><span style="color: #FFA500; font-weight: bold;">{draft_only} agent(s) have guardrails in draft/SAVED state only — publish the agent to activate guardrail protection.</span><br>'
                  if agents_without_guardrail:
                      html += '<br><span style="color: #FFA500;">AI agents without any guardrail:</span><ul>'
                      for a_name in agents_without_guardrail:
                          html += f"<li>{escape(a_name)}</li>"
                      html += "</ul>"
          
                  # --- Final recommendations ---
                  if not published:
                      html += """<br><span style="color: red; font-weight: bold;">CRITICAL: No published AI guardrails found. PII protection and content filtering are NOT active.</span>"""
                  if not published or missing_checks or agents_without_guardrail or agents_with_guardrail_draft_only:
                      html += """<h4>Recommendation</h4><ul>"""
                      if not published:
                          html += "<li>Deploy at least one guardrail with all five filter types enabled.</li>"
                      if missing_checks:
                          html += "<li>Add missing filter types to existing guardrails (see table above).</li>"
                      if agents_with_guardrail_draft_only:
                          html += f"<li>{draft_only} AI agent(s) have guardrails in draft/SAVED state only — publish the agent version to activate protection.</li>"
                      if agents_without_guardrail:
                          html += f"<li>{unprotected} AI agent(s) have no guardrail at all — configure guardrails in the AI agent's orchestration settings.</li>"
                      html += """<li>Recommended filter coverage: Content Filter + PII Filter + Denied Topics + Word Filter + Contextual Grounding.</li>
                          <li>Maximum 3 custom guardrails per assistant.</li>
                          <li>Refer <a href="https://docs.aws.amazon.com/connect/latest/adminguide/ai-guardrails.html" target="_blank">documentation</a>.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"S1 Error: {e}")
                  return html + f"<br>Error checking guardrails: {escape(str(e))}"
          
          """S4: Q in Connect Domain Encryption"""
          def check_q_domain_encryption(assistant_id):
              html = "<b>Q in Connect Domain Encryption</b><br>"
              logger.info(f"[S4] Starting Domain Encryption check for assistant_id={assistant_id}")
