          """Paginate any qconnect/bedrock list API safely"""
          def paginate_api_call(client_method, result_key, **kwargs):
              all_items = []
              try:
                  logger.info(f"[PAGINATE] Calling {client_method.__name__} with result_key={result_key}, kwargs={kwargs}")
                  response = client_method(**kwargs)
                  items = response.get(result_key, [])
                  logger.info(f"[PAGINATE] First page returned {len(items)} items for key '{result_key}'")
                  logger.debug(f"[PAGINATE] Response keys: {list(response.keys())}")
                  all_items.extend(items)
                  page_count = 1
                  while response.get('nextToken'):
                      page_count += 1
                      response = client_method(nextToken=response['nextToken'], **kwargs)
                      items = response.get(result_key, [])
                      logger.info(f"[PAGINATE] Page {page_count} returned {len(items)} items")
                      all_items.extend(items)
                  logger.info(f"[PAGINATE] Total: {len(all_items)} items across {page_count} page(s)")
              except ClientError as e:
                  logger.error(f"[PAGINATE] ClientError for {result_key}: {e.response['Error']['Code']} - {e.response['Error']['Message']}")
              except Exception as e:
                  logger.error(f"[PAGINATE] Unexpected error for {result_key}: {type(e).__name__}: {e}")
              return all_items
          
          """Discover Assistant ID from Connect instance integration associations"""
          def discover_assistant_id(instance_id):
              try:
                  logger.info(f"[DISCOVER] Attempting to discover assistant ID for instance: {instance_id}")
                  response = connect_client.list_integration_associations(
                      InstanceId=instance_id,
                      IntegrationType='WISDOM_ASSISTANT'
                  )
                  associations = response.get('IntegrationAssociationSummaryList', [])
                  logger.info(f"[DISCOVER] Found {len(associations)} WISDOM_ASSISTANT integration(s)")
                  for i, assoc in enumerate(associations):
                      logger.info(f"[DISCOVER] Association[{i}]: IntegrationArn={assoc.get('IntegrationArn', 'N/A')}, "
                                  f"IntegrationType={assoc.get('IntegrationType', 'N/A')}, "
                                  f"IntegrationAssociationId={assoc.get('IntegrationAssociationId', 'N/A')}")
                  if associations:
                      assistant_arn = associations[0].get('IntegrationArn', '')
                      assistant_id = assistant_arn.split('/')[-1] if '/' in assistant_arn else ''
                      logger.info(f"[DISCOVER] Auto-discovered Assistant ID: {assistant_id} from ARN: {assistant_arn}")
                      return assistant_id
                  logger.warning("[DISCOVER] No WISDOM_ASSISTANT integration found for this instance. "
                                "Check: 1) Is Q in Connect enabled? 2) Is an assistant associated with this instance?")
                  return None
              except ClientError as e:
                  logger.error(f"[DISCOVER] ClientError: {e.response['Error']['Code']} - {e.response['Error']['Message']}")
                  return None
              except Exception as e:
                  logger.error(f"[DISCOVER] Unexpected error: {type(e).__name__}: {e}")
                  return None
          
          """C1: AI Agent Inventory & Status"""
