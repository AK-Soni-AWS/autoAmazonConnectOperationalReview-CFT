                              Period=86400, Statistics=['Maximum'])
                          dps = resp.get('Datapoints', [])
                          return int(max((dp.get('Maximum', 0) for dp in dps), default=0)) if dps else 0
                      except Exception:
                          return 0

                  def _get_peak_pct(metric_name, metric_group, is_decimal=False):
                      try:
