                  # ── S3 Encryption Check (under Security) ──
                  s3_encrypted_count = s3_total_configs - len(unencrypted_s3_buckets)
                  if unencrypted_s3_buckets:
                      checks.append({"pillar": "Security", "check": "S3 Data Encryption", "status": "fail", "detail": f"{s3_encrypted_count}/{s3_total_configs} S3 configs encrypted, {len(unencrypted_s3_buckets)} missing KMS encryption", "anchor": "sec-s3-encryption"})
                      unenc_rows = ""
                      for ub in unencrypted_s3_buckets:
                          unenc_rows += f"""<tr><td>{escape(ub['resource_type'])}</td><td>{escape(ub['bucket'])}</td><td style="color:#ef4444;">No KMS encryption configured</td></tr>"""
                      html_output += f"""
                      <div class="section" id="sec-s3-encryption">
                          <h3>S3 Data Encryption</h3>
