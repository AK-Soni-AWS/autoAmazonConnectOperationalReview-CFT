                              break
                          except Exception as retry_e:
                              logger.warning(f"list_aws_default_service_quotas attempt {attempt+1} failed: {retry_e}")
                              time.sleep(2 ** attempt)
                      logger.info(f"Fetched {len(default_quotas)} default quotas")

                      # Split into modified (Default != Current) and default quotas
                      modified_row_parts = []
                      default_row_parts = []
                      modified_count = 0
                      for qcode in sorted(default_quotas.keys()):
                          default = default_quotas.get(qcode)
                          if not default:
                              continue
                          qname = default.get('QuotaName', qcode)
                          if not qname.startswith('Rate of'):
                              continue
                          applied = applied_quotas.get(qcode)
                          current_val = applied['Value'] if applied else default['Value']
                          default_val = default['Value']
                          api_rate_count += 1

                          if applied and current_val != default_val:
                              # Modified quota — fetch utilization
                              util_display = "-"
                              usage_metric = applied.get('UsageMetric')
                              if usage_metric:
                                  try:
                                      dims = [{'Name': k, 'Value': v} for k, v in usage_metric.get('MetricDimensions', {}).items()]
