                          <li>Configure a customer-managed KMS key for the Q in Connect domain to enable key rotation auditing and access control.</li>
                          <li>Refer <a href="https://docs.aws.amazon.com/connect/latest/adminguide/encryption-at-rest.html" target="_blank">documentation</a>.</li></ul>"""
                  return html
