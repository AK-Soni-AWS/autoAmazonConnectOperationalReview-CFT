              try:
                  assistant_arn = f"arn:aws:wisdom:{aws_region}:{account_id}:assistant/{assistant_id}"
                  logger.info(f"[P1] Constructed assistant ARN: {assistant_arn}")
                  response = logs_client.describe_deliveries()
                  deliveries = response.get('deliveries', [])
                  logger.info(f"[P1] describe_deliveries returned {len(deliveries)} total delivery/deliveries")
                  for d in deliveries:
                      logger.debug(f"[P1] Delivery: id={d.get('id')}, source={d.get('deliverySourceName')}, dest_type={d.get('deliveryDestinationType')}")
                  # Match by checking if assistant_id appears in source name OR by checking delivery source ARNs
                  matching = []
                  for d in deliveries:
                      source_name = d.get('deliverySourceName', '')
                      # Check direct assistant_id match in source name
                      if assistant_id in source_name:
                          matching.append(d)
                      # Also check for wisdom/qconnect delivery sources (WdDeliverySource pattern)
                      elif 'WdDeliverySource' in source_name or 'wisdom' in source_name.lower() or 'qconnect' in source_name.lower():
                          # This could be the assistant's delivery - check the delivery source details
                          try:
                              source_detail = logs_client.describe_delivery_sources()
                              for src in source_detail.get('deliverySources', []):
                                  if src.get('name') == source_name and assistant_id in src.get('resourceArn', ''):
                                      matching.append(d)
                                      logger.info(f"[P1] Matched delivery via source ARN: {src.get('resourceArn')}")
                                      break
                          except Exception as src_err:
                              logger.debug(f"[P1] Could not check delivery source detail: {src_err}")
                  logger.info(f"[P1] Found {len(matching)} delivery/deliveries matching assistant_id={assistant_id}")
                  if matching:
                      html += f"<br>CloudWatch log delivery configured ({len(matching)} delivery/deliveries found).<br>"
                      html += """<table style="width: 80%"><tr><th>Delivery ID</th><th>Source</th><th>Destination Type</th></tr>"""
                      for d in matching:
                          html += f"<tr><td>{escape(d.get('id', 'N/A'))}</td><td>{escape(d.get('deliverySourceName', 'N/A'))}</td><td>{escape(d.get('deliveryDestinationType', 'N/A'))}</td></tr>"
                      html += "</table>"
                  else:
                      html += """<br><span style="color: red; font-weight: bold;">No CloudWatch log delivery configured for AI Agent events.</span>"""
                      html += """<h4>Recommendation</h4><ul>
                          <li>Enable AI Agent event logging via CloudWatch Vended Logs delivery for the assistant.</li>
                          <li>This is required for analytics: tool usage, session analysis, LLM tracking, intent detection.</li>
                          <li>Supported event types: TRANSCRIPT_AGENTIC_MESSAGE, TRANSCRIPT_SELF_SERVICE_MESSAGE, TRANSCRIPT_CREATE_SESSION, TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION, TRANSCRIPT_RECOMMENDATION, and more.</li>
                          <li>Refer <a href="https://docs.aws.amazon.com/connect/latest/adminguide/monitor-ai-agents.html" target="_blank">documentation</a>.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"P1 Error: {e}")
                  return html + f"<br>Error checking AI agent logging: {escape(str(e))}"
          
          """Q2: Q in Connect Hard Limits"""
          def check_q_hard_limits(assistant_id):
              html = "<b>Q in Connect Service Limits</b><br>"
              logger.info(f"[Q2] Starting Q Hard Limits check for assistant_id={assistant_id}")
              try:
                  assistants = paginate_api_call(qconnect_client.list_assistants, 'assistantSummaries', maxResults=100)
                  total_assistants = len(assistants)
                  logger.info(f"[Q2] list_assistants returned {total_assistants} assistant(s)")
                  for a in assistants:
                      logger.info(f"[Q2] Assistant: id={a.get('assistantId')}, name={a.get('name')}, type={a.get('type')}, status={a.get('status')}")
          
                  kb_associations = []
                  try:
                      assoc_resp = qconnect_client.list_assistant_associations(assistantId=assistant_id, maxResults=100)
                      kb_associations = [a for a in assoc_resp.get('assistantAssociationSummaries', []) if a.get('associationType') == 'KNOWLEDGE_BASE']
                  except Exception as e:
                      logger.warning(f"Could not list assistant associations: {e}")
          
                  html += """<br><table style="width: 50%">
                      <tr><th>Resource</th><th>Current</th><th>Limit</th><th>Usage %</th></tr>"""
                  # Assistants per account (limit 5, not adjustable)
                  asst_pct = round(total_assistants / 5 * 100, 1)
                  html += f'<tr><td>Assistants per account</td><td>{total_assistants}</td><td>5</td><td style="background-color: {get_color_by_percentage(asst_pct)};">{asst_pct}%</td></tr>'
                  # KBs per assistant (limit 10)
                  kb_count = len(kb_associations)
                  kb_pct = round(kb_count / 10 * 100, 1)
                  html += f'<tr><td>Knowledge Bases per assistant</td><td>{kb_count}</td><td>10</td><td style="background-color: {get_color_by_percentage(kb_pct)};">{kb_pct}%</td></tr>'
                  # Assistant associations per instance (limit 1, not adjustable)
                  html += f'<tr><td>Assistant per Connect instance</td><td>1</td><td>1</td><td style="background-color: {get_color_by_percentage(100)};">100%</td></tr>'
                  html += "</table>"
          
                  # Check article counts per KB
                  if kb_associations:
                      html += "<br><b>Knowledge Base Article Counts</b><br>"
                      html += """<table style="width: 60%"><tr><th>Knowledge Base ID</th><th>Articles</th><th>Limit</th><th>Usage %</th></tr>"""
                      for assoc in kb_associations:
                          kb_id = assoc.get('associationData', {}).get('knowledgeBaseAssociation', {}).get('knowledgeBaseId', '')
                          if kb_id:
                              try:
                                  contents = paginate_api_call(qconnect_client.list_contents, 'contentSummaries', knowledgeBaseId=kb_id, maxResults=100)
                                  article_count = len(contents)
                                  art_pct = round(article_count / 5000 * 100, 1)
                                  html += f'<tr><td>{escape(kb_id)}</td><td>{article_count}</td><td>5000</td><td style="background-color: {get_color_by_percentage(art_pct)};">{art_pct}%</td></tr>'
                              except Exception:
                                  html += f'<tr><td>{escape(kb_id)}</td><td>N/A</td><td>5000</td><td>N/A</td></tr>'
                      html += "</table>"
          
                  html += """<h4>Key Constraints</h4><ul>
                      <li>1 assistant association per Connect instance (not adjustable) - plan architecture accordingly.</li>
                      <li>5,000 articles per knowledge base (not adjustable) - prioritize by relevance, retire stale content.</li>
                      <li>5 GB maximum knowledge base size (not adjustable).</li>
                      <li>SendMessage API: 1-2 TPS depending on region.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"Q2 Error: {e}")
                  return html + f"<br>Error checking Q in Connect limits: {escape(str(e))}"
          
          """R3: Knowledge Base Association & Sync Health"""
          def check_kb_sync_health(assistant_id):
              html = "<b>Knowledge Base Sync Health</b><br>"
              logger.info(f"[R3] Starting KB Sync Health check for assistant_id={assistant_id}")
              try:
                  assoc_resp = qconnect_client.list_assistant_associations(assistantId=assistant_id, maxResults=100)
                  all_associations = assoc_resp.get('assistantAssociationSummaries', [])
                  logger.info(f"[R3] list_assistant_associations returned {len(all_associations)} total association(s)")
                  for a in all_associations:
                      logger.info(f"[R3] Association: type={a.get('associationType')}, id={a.get('assistantAssociationId')}")
                  kb_associations = [a for a in all_associations if a.get('associationType') == 'KNOWLEDGE_BASE']
                  logger.info(f"[R3] Found {len(kb_associations)} KNOWLEDGE_BASE association(s)")
          
                  if not kb_associations:
                      html += "<br>No knowledge bases associated with this assistant."
                      html += """<h4>Recommendation</h4><ul><li>Associate at least one knowledge base with the assistant for AI agent retrieval capabilities.</li></ul>"""
                      return html
          
                  html += f"<br>Found {len(kb_associations)} knowledge base association(s).<br><br>"
                  html += """<table style="width: 80%"><tr><th>KB Name</th><th>KB ID</th><th>Status</th><th>Last Content Modified</th><th>Hours Since Sync</th><th>Health</th></tr>"""
                  stale_kbs = []
                  for assoc in kb_associations:
                      kb_id = assoc.get('associationData', {}).get('knowledgeBaseAssociation', {}).get('knowledgeBaseId', '')
                      if not kb_id:
                          continue
                      try:
                          kb_resp = qconnect_client.get_knowledge_base(knowledgeBaseId=kb_id)
                          kb = kb_resp.get('knowledgeBase', {})
                          kb_name = escape(kb.get('name', 'N/A'))
                          kb_status = escape(kb.get('status', 'N/A'))
                          last_modified = kb.get('lastContentModificationTime')
                          if last_modified:
                              hours_since = (datetime.now(timezone.utc) - last_modified).total_seconds() / 3600
                              hours_str = f"{hours_since:.1f}"
                              health = "STALE" if hours_since > 24 else "HEALTHY"
                              if hours_since > 24:
                                  stale_kbs.append(kb_name)
                              color = "#FF0000" if hours_since > 24 else "#00FF00"
                              last_mod_str = last_modified.strftime("%Y-%m-%d %H:%M UTC")
                          else:
                              hours_str = "Unknown"
                              health = "UNKNOWN"
                              color = "#FFA500"
                              last_mod_str = "Never"
                          html += f'<tr><td>{kb_name}</td><td>{escape(kb_id)}</td><td>{kb_status}</td><td>{last_mod_str}</td><td>{hours_str}</td><td style="background-color: {color};">{health}</td></tr>'
                      except Exception as kb_err:
                          html += f'<tr><td>N/A</td><td>{escape(kb_id)}</td><td>ERROR</td><td>N/A</td><td>N/A</td><td style="background-color: #FFA500;">ERROR</td></tr>'
                          logger.warning(f"Error getting KB {kb_id}: {kb_err}")
                  html += "</table>"
                  if stale_kbs:
                      html += f"""<h4>Recommendation</h4><ul>
                          <li>Knowledge base(s) with stale data (&gt;24h since last sync): {', '.join(stale_kbs)}</li>
                          <li>Check sync configuration (default: 1 hour). For S3 sources, verify S3 event triggers.</li>
                          <li>Set CloudWatch alarm on <code>RecordsFailed &gt; 0</code> in <code>AWS/AppIntegrations</code> namespace.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"R3 Error: {e}")
                  return html + f"<br>Error checking KB sync health: {escape(str(e))}"
          
          """P8: Connect Contact Flow Errors"""
          def check_flow_errors(instance_id, days_back):
              html = "<b>Contact Flow Errors &amp; Fatal Errors</b><br>"
              try:
                  end_time = datetime.utcnow()
                  start_time = end_time - timedelta(days=days_back)
                  # Check ContactFlowFatalErrors
                  fatal_resp = cloudwatch_client.get_metric_statistics(
                      Namespace='AWS/Connect', MetricName='ContactFlowFatalErrors',
                      Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}],
                      StartTime=start_time, EndTime=end_time, Period=86400, Statistics=['Sum'])
                  fatal_dps = fatal_resp.get('Datapoints', [])
                  total_fatal = int(sum(d.get('Sum', 0) for d in fatal_dps))
          
                  # Check ContactFlowErrors
                  error_resp = cloudwatch_client.get_metric_statistics(
                      Namespace='AWS/Connect', MetricName='ContactFlowErrors',
                      Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}],
                      StartTime=start_time, EndTime=end_time, Period=86400, Statistics=['Sum'])
                  error_dps = error_resp.get('Datapoints', [])
                  total_errors = int(sum(d.get('Sum', 0) for d in error_dps))
          
                  fatal_color = "#FF0000" if total_fatal > 0 else "#00FF00"
                  error_color = "#FF0000" if total_errors > 50 else "#FFA500" if total_errors > 0 else "#00FF00"
          
                  html += f"""<br><table style="width: 50%">
                      <tr><th>Metric</th><th>Count ({days_back} days)</th><th>Status</th></tr>
                      <tr><td>Contact Flow Fatal Errors</td><td>{total_fatal}</td><td style="background-color: {fatal_color};">{'CRITICAL' if total_fatal > 0 else 'OK'}</td></tr>
                      <tr><td>Contact Flow Errors</td><td>{total_errors}</td><td style="background-color: {error_color};">{'CRITICAL' if total_errors > 50 else 'WARNING' if total_errors > 0 else 'OK'}</td></tr>
                      </table>"""
                  if total_fatal > 0 or total_errors > 50:
                      html += """<h4>Recommendation</h4><ul>
                          <li>Fatal errors indicate flow execution failures - check Lambda timeouts, Bedrock throttling, and missing error branches.</li>
                          <li>Correlate with Bedrock latency (P6) and throttling (P7) findings for root cause.</li>
                          <li>Set CloudWatch alarm: <code>ContactFlowFatalErrors &gt; 0</code> for any 5-minute window.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"P8 Error: {e}")
                  return html + f"<br>Error checking flow errors: {escape(str(e))}"
          
          """S3: KMS Encryption for Connect Storage"""
          def check_connect_storage_encryption(instance_id):
              html = "<b>KMS Encryption for Connect Storage</b><br>"
              logger.info(f"[S3] Starting Connect Storage Encryption check for instance_id={instance_id}")
              try:
                  resource_types = ['CALL_RECORDINGS', 'CHAT_TRANSCRIPTS', 'SCHEDULED_REPORTS', 'MEDIA_STREAMS', 'AGENT_EVENTS']
                  html += """<br><table style="width: 70%"><tr><th>Storage Type</th><th>Encryption Type</th><th>KMS Key</th><th>Status</th></tr>"""
                  has_issues = False
                  for res_type in resource_types:
                      try:
                          resp = connect_client.list_instance_storage_configs(
                              InstanceId=instance_id,
                              ResourceType=res_type
                          )
                          configs = resp.get('StorageConfigs', [])
                          if not configs:
                              html += f'<tr><td>{escape(res_type)}</td><td>Not configured</td><td>N/A</td><td style="background-color: #CCCCCC;">N/A</td></tr>'
                              continue
                          for config in configs:
                              enc = config.get('KinesisVideoStreamConfig', {}).get('EncryptionConfig', {}) or \
                                    config.get('S3Config', {}).get('EncryptionConfig', {}) or \
                                    config.get('KinesisStreamConfig', {}).get('EncryptionConfig', {}) or \
                                    config.get('KinesisFirehoseConfig', {}).get('EncryptionConfig', {}) or {}
                              enc_type = enc.get('EncryptionType', 'Not set')
                              key_id = enc.get('KeyId', 'N/A')
                              if enc_type == 'KMS' and key_id and not key_id.startswith('alias/aws/'):
                                  status = 'CMK'
                                  color = '#00FF00'
                              elif enc_type == 'KMS':
                                  status = 'AWS Managed'
                                  color = '#FFA500'
                                  has_issues = True
                              else:
                                  status = 'No KMS'
                                  color = '#FFA500'
                                  has_issues = True
                              masked_key = (key_id[:40] + '...') if len(key_id) > 40 else key_id
                              html += f'<tr><td>{escape(res_type)}</td><td>{escape(enc_type)}</td><td>{escape(masked_key)}</td><td style="background-color: {color};">{status}</td></tr>'
                      except ClientError as e:
                          if e.response['Error']['Code'] == 'ResourceNotFoundException':
                              html += f'<tr><td>{escape(res_type)}</td><td>Not configured</td><td>N/A</td><td style="background-color: #CCCCCC;">N/A</td></tr>'
                          else:
                              html += f'<tr><td>{escape(res_type)}</td><td colspan="3">Error: {escape(e.response["Error"]["Code"])}</td></tr>'
                  html += "</table>"
                  if has_issues:
                      html += """<h4>Recommendation</h4><ul>
                          <li>Use customer-managed KMS keys for all storage types for full control over key rotation and access auditing.</li>
                          <li>Refer <a href="https://docs.aws.amazon.com/connect/latest/adminguide/encryption-at-rest.html" target="_blank">documentation</a>.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"S3 Error: {e}")
                  return html + f"<br>Error checking storage encryption: {escape(str(e))}"
          
          """Q2: Lambda Integration Limits"""
          def check_lambda_integration_limits(instance_id):
              html = "<b>Lambda Integration Limits</b><br>"
              logger.info(f"[Q2] Starting Lambda Integration Limits check for instance_id={instance_id}")
              try:
                  lambda_functions = []
                  next_token = None
                  while True:
                      kwargs = {'InstanceId': instance_id, 'MaxResults': 25}
                      if next_token:
                          kwargs['NextToken'] = next_token
                      resp = connect_client.list_lambda_functions(**kwargs)
                      lambda_functions.extend(resp.get('LambdaFunctions', []))
                      next_token = resp.get('NextToken')
                      if not next_token:
                          break
                  total = len(lambda_functions)
                  logger.info(f"[Q2] Found {total} Lambda function(s)")
                  limit = 50
                  pct = round(total / limit * 100, 1)
                  color = get_color_by_percentage(pct)
                  html += f"""<br><table style="width: 50%">
                      <tr><th>Resource</th><th>Current</th><th>Limit</th><th>Usage %</th></tr>
                      <tr><td>Lambda functions per instance</td><td>{total}</td><td>{limit}</td><td style="background-color: {color};">{pct}%</td></tr>
                      </table>"""
                  if lambda_functions:
                      html += "<br><b>Associated Lambda Functions:</b><br>"
                      html += """<table style="width: 80%"><tr><th>#</th><th>Lambda Function ARN</th></tr>"""
                      for i, fn_arn in enumerate(lambda_functions, 1):
                          html += f"<tr><td>{i}</td><td>{escape(fn_arn)}</td></tr>"
                      html += "</table>"
                  if pct >= 80:
                      html += """<h4>Recommendation</h4><ul>
                          <li>Lambda function count is approaching the 50-function limit (adjustable).</li>
                          <li>Consolidate Lambda functions using a router pattern (single function dispatching to different handlers).</li>
                          <li>Request quota increase if needed.</li></ul>"""
                  return html
              except Exception as e:
                  logger.error(f"Q2 Error: {e}")
                  return html + f"<br>Error checking Lambda limits: {escape(str(e))}"
          
          """S4: MCP Tool Sprawl Detection"""
          def check_mcp_tool_sprawl(instance_id):
              html = "<b>MCP Tool Sprawl &amp; Unused Tool Detection</b><br>"
              logger.info(f"[SEC-MCP] Starting MCP Tool Sprawl check for instance_id={instance_id}")
              html += """<div style="background-color: #e8f4f8; padding: 10px; margin: 10px 0; border-left: 4px solid #0073bb;">
                  <p><strong>Why This Check Matters:</strong> When an AI agent has many MCP tools available, the LLM must evaluate
                  ALL tools during each inference cycle to determine which to invoke. A larger tool space directly increases
                  the tool-selection phase of each inference, causing measurable response latency.</p></div>"""
              try:
                  profiles_resp = connect_client.list_security_profiles(InstanceId=instance_id, MaxResults=100)
                  security_profiles = profiles_resp.get('SecurityProfileSummaryList', [])
                  logger.info(f"[SEC-MCP] list_security_profiles returned {len(security_profiles)} profile(s)")
          
                  profile_analysis = []
                  has_critical = False
                  total_mcp_tools = 0
          
                  for profile_summary in security_profiles:
                      profile_id = profile_summary['Id']
                      profile_name = profile_summary.get('Name', 'Unknown')
                      logger.info(f"[SEC-MCP] Checking profile: {profile_name} (id={profile_id})")
                      try:
                          detail = connect_client.describe_security_profile(
                              InstanceId=instance_id,
                              SecurityProfileId=profile_id
                          )
                          security_profile = detail.get('SecurityProfile', {})
                          applications = security_profile.get('Applications', [])
                          logger.info(f"[SEC-MCP] Profile '{profile_name}': {len(applications)} application block(s) from describe_security_profile")
          
                          # If Applications is empty, try list_security_profile_applications API
                          if not applications:
                              try:
                                  app_resp = connect_client.list_security_profile_applications(
                                      InstanceId=instance_id,
                                      SecurityProfileId=profile_id,
                                      MaxResults=100
                                  )
                                  app_list = app_resp.get('Applications', [])
                                  if app_list:
                                      applications = app_list
                                      logger.info(f"[SEC-MCP] Profile '{profile_name}': {len(applications)} application(s) from list_security_profile_applications")
                                  else:
                                      logger.debug(f"[SEC-MCP] Profile '{profile_name}': list_security_profile_applications also returned 0")
                              except Exception as app_err:
                                  logger.debug(f"[SEC-MCP] list_security_profile_applications not available or failed for '{profile_name}': {app_err}")
          
                          logger.info(f"[SEC-MCP] Profile '{profile_name}': final {len(applications)} application(s), "
                                     f"AllowedAccessControlTags={security_profile.get('AllowedAccessControlTags', {})}")
          
                          mcp_tools = []
                          api_targets = {}
                          for app in applications:
                              namespace = app.get('Namespace', 'Unknown')
                              permissions = app.get('ApplicationPermissions', [])
                              for permission in permissions:
                                  parts = permission.split('___')
                                  target = parts[0] if len(parts) > 1 else 'Unknown'
                                  operation = parts[1] if len(parts) > 1 else permission
                                  mcp_tools.append({'namespace': namespace, 'tool_name': permission, 'api_target': target, 'operation': operation})
                                  if target not in api_targets:
                                      api_targets[target] = []
                                  api_targets[target].append(operation)
          
                          tool_count = len(mcp_tools)
                          total_mcp_tools += tool_count
          
                          if tool_count > 30:
                              status = 'FAIL'
                              has_critical = True
                              severity = 'CRITICAL'
                              color = '#FF0000'
                          elif tool_count > 15:
                              status = 'WARNING'
                              severity = 'HIGH'
                              color = '#FFA500'
                          elif tool_count > 0:
                              status = 'PASS'
                              severity = 'OK'
                              color = '#00FF00'
                          else:
                              status = 'INFO'
                              severity = 'N/A'
                              color = '#CCCCCC'
          
                          profile_analysis.append({
                              'name': profile_name, 'id': profile_id,
                              'tool_count': tool_count, 'target_count': len(api_targets),
                              'api_targets': api_targets, 'status': status,
                              'severity': severity, 'color': color
                          })
                      except ClientError as e:
                          logger.warning(f"Could not describe security profile {profile_id}: {e}")
          
                  profiles_with_mcp = [p for p in profile_analysis if p['tool_count'] > 0]
                  critical_profiles = [p for p in profile_analysis if p['status'] == 'FAIL']
          
                  html += f"<br><strong>Summary:</strong> {len(security_profiles)} profiles scanned | "
                  html += f"{len(profiles_with_mcp)} with MCP tools | "
                  html += f"{len(critical_profiles)} critical | "
                  html += f"{total_mcp_tools} total MCP tools<br><br>"
          
                  if profiles_with_mcp:
                      html += """<table style="width: 80%"><tr><th>Security Profile</th><th>MCP Tools</th><th>API Targets</th><th>Status</th></tr>"""
                      for p in sorted(profile_analysis, key=lambda x: x['tool_count'], reverse=True):
                          if p['tool_count'] > 0:
                              html += f'<tr><td><strong>{escape(p["name"])}</strong></td>'
                              html += f'<td style="text-align:center;"><strong>{p["tool_count"]}</strong></td>'
                              html += f'<td style="text-align:center;">{p["target_count"]}</td>'
                              html += f'<td style="background-color: {p["color"]}; text-align:center;">{p["severity"]}</td></tr>'
                      html += "</table>"
          
                      # Show API target breakdown for critical profiles
                      for p in critical_profiles:
                          html += f"<br><strong>Profile: {escape(p['name'])} — {p['tool_count']} tools across {p['target_count']} API targets:</strong><br>"
                          html += """<table style="width: 60%"><tr><th>API Target</th><th>Operations</th></tr>"""
                          for target, ops in p['api_targets'].items():
                              html += f"<tr><td>{escape(target)}</td><td>{len(ops)} ({', '.join(escape(o) for o in ops[:5])}{'...' if len(ops) > 5 else ''})</td></tr>"
                          html += "</table>"
                  else:
                      html += "<br>No MCP tools configured on any security profile."
          
                  if has_critical:
                      html += """<div style="background-color: #ffebee; padding: 10px; margin: 10px 0; border-left: 4px solid #d32f2f;">
                          <h4>Immediate Action Required</h4><ol>
                          <li><strong>Audit usage:</strong> Check CloudWatch Logs for which MCP tools are actually invoked by AI agents.</li>
                          <li><strong>Remove unused:</strong> Remove permissions not used by the AI agent's specific use case.</li>
                          <li><strong>Role-specific profiles:</strong> Create separate security profiles per AI agent instead of one with all tools.</li>
                          <li><strong>Test latency:</strong> Verify improvement after reduction.</li></ol></div>"""
