                          html_output += '<div class="section"><h3>S3: KMS Encryption for Connect Storage</h3>'
                          html_output += '<p><em>Checks KMS encryption configuration for call recordings, chat transcripts, and other Connect storage types.</em></p>'
                          html_output += check_connect_storage_encryption(instance_id)
                          html_output += '</div>'
                          logger.info(f"S3 completed in {time.time() - lambda_exec_intermediate_time:.1f}s")
                          lambda_exec_intermediate_time = time.time()
          
                          # --- S4: MCP Tool Sprawl ---
                          html_output += '<div class="section"><h3>S4: MCP Tool Sprawl Detection</h3>'
                          html_output += '<p><em>Detects excessive MCP tool permissions on security profiles that increase AI agent inference latency.</em></p>'
                          html_output += check_mcp_tool_sprawl(instance_id)
                          html_output += '</div>'
                          logger.info(f"S4 completed in {time.time() - lambda_exec_intermediate_time:.1f}s")
                          lambda_exec_intermediate_time = time.time()
          
                          # --- Performance Checks ---
                          html_output += """<h2>AI Agent Performance</h2>"""
          
                          # --- P1: AI Agent Logging ---
                          html_output += '<div class="section"><h3>P1: AI Agent Logging &amp; Observability</h3>'
                          html_output += '<p><em>Checks if CloudWatch event log delivery is configured for the AI assistant — required for all log-based analytics.</em></p>'
                          html_output += check_ai_agent_logging(assistant_id, account_id, aws_region)
                          html_output += '</div>'
                          logger.info(f"P1 completed in {time.time() - lambda_exec_intermediate_time:.1f}s")
                          lambda_exec_intermediate_time = time.time()
          
                          # --- P2: Flow Errors ---
                          html_output += '<div class="section"><h3>P2: Contact Flow Errors</h3>'
                          html_output += '<p><em>Monitors ContactFlowErrors and ContactFlowFatalErrors from CloudWatch to detect flow execution failures.</em></p>'
                          html_output += check_flow_errors(instance_id, days_back)
                          html_output += '</div>'
                          logger.info(f"P2 completed in {time.time() - lambda_exec_intermediate_time:.1f}s")
                          lambda_exec_intermediate_time = time.time()
          
                          # --- Resilience Checks ---
                          html_output += """<h2>AI Agent Resilience</h2>"""
          
                          # --- R1: KB Sync Health ---
                          html_output += '<div class="section"><h3>R1: Knowledge Base Sync Health</h3>'
                          html_output += '<p><em>Checks knowledge base associations and content freshness — flags stale KBs not synced in over 24 hours.</em></p>'
                          html_output += check_kb_sync_health(assistant_id)
                          html_output += '</div>'
                          logger.info(f"R1 completed in {time.time() - lambda_exec_intermediate_time:.1f}s")
                          lambda_exec_intermediate_time = time.time()
          
                          # --- Service Quotas ---
                          html_output += """<h2>AI Agent Service Quotas</h2>"""
          
                          # --- Q1: Q Hard Limits ---
                          html_output += '<div class="section"><h3>Q1: Q in Connect Service Limits</h3>'
                          html_output += '<p><em>Checks current usage against non-adjustable Q in Connect limits: assistants, knowledge bases, articles, and instance associations.</em></p>'
                          html_output += check_q_hard_limits(assistant_id)
                          html_output += '</div>'
                          logger.info(f"Q1 completed in {time.time() - lambda_exec_intermediate_time:.1f}s")
                          lambda_exec_intermediate_time = time.time()
          
                          # --- Q2: Lambda Integration Limits ---
                          html_output += '<div class="section"><h3>Q2: Lambda Integration Limits</h3>'
                          html_output += '<p><em>Counts Lambda functions associated with the Connect instance against the 50-function limit.</em></p>'
                          html_output += check_lambda_integration_limits(instance_id)
                          html_output += '</div>'
                          logger.info(f"Q2 completed in {time.time() - lambda_exec_intermediate_time:.1f}s")
                          lambda_exec_intermediate_time = time.time()
          
                          logger.info("AI Agent checks completed.")
                      else:
                          html_output += """<h2>AI Agent Checks</h2>
                              <p>No Q in Connect assistant found. AI Agent checks skipped.
                              Associate a Q in Connect assistant or set <code>ASSISTANT_ID</code> env var.</p>"""
                          logger.info("No assistant ID. AI checks skipped.")
                  else:
                      logger.info("AI Agent checks disabled (ENABLE_AI_CHECKS=false)")
          
                  # Get Date timestamp
                  now_utc = datetime.now(timezone.utc)
                  date_time = now_utc.strftime("%m%d%Y_%H%M%S")
          
                  # Save HTML report locally for debugging
                  local_report_path = f"connect-review_{instance_id}_{aws_region}_{date_time}.html"
                  try:
                      with open(local_report_path, 'w') as f:
                          f.write(html_output)
                      logger.info(f"Local HTML report saved: {local_report_path}")
                  except Exception as local_err:
                      logger.warning(f"Could not save local report: {local_err}")
          
                  # Upload to S3
                  upload_string_to_s3(html_output, s3_reporting_bucket, 'connect-review_'+instance_id+'_'+aws_region+'_'+date_time+'.html','text/html') 
          
                  lambda_exec_end_time = time.time()
                  duration = lambda_exec_end_time - lambda_exec_start_time
                  print(f"Lambda execution time: {duration}")
          
                  return {
                          'statusCode': 200,
                          'body': json.dumps({'success': f'Amazon Connect Ops Review document succesfully generated. Execution duration: {duration} seconds")'})
                      }
          
              except Exception as e:
                  exc_type, exc_obj, exc_tb = sys.exc_info()
                  lineno = exc_tb.tb_lineno
                  (f"AWS Client Error: {e}")
                  logger.error(f"An error occurred: {e}")
                  logger.error(f"Error on line: {lineno}")
                  logger.error(f"Traceback: {traceback.print_exc()}")
                  return {
                      'statusCode': 400,
                      'body': json.dumps({
                          'error': 'AWS API Error',
                          'line': lineno,
                          'message': str(traceback.print_exc())
                      })
                  }
          
          
