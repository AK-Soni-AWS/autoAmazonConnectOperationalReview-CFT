                          <table style="width: 80%;">
                              <tr><th>Resource Type</th><th>S3 Bucket</th><th>Encryption Status</th></tr>
                              {unenc_rows}
                          </table>
                          <h4>Recommendations</h4>
                          <ul>
                              <li>Enable KMS encryption for all S3 buckets used by Amazon Connect to protect sensitive customer data at rest.</li>
                              <li>Use AWS managed keys or customer managed keys (CMK) for encryption. Refer to <a href="https://docs.aws.amazon.com/connect/latest/adminguide/encryption-at-rest.html" target="_blank">encryption at rest documentation</a>.</li>
                          </ul>
                      </div>"""
                  elif s3_total_configs > 0:
                      checks.append({"pillar": "Security", "check": "S3 Data Encryption", "status": "pass", "detail": f"All {s3_total_configs} S3 storage configs have KMS encryption", "anchor": "sec-s3-encryption"})
                  else:
                      checks.append({"pillar": "Security", "check": "S3 Data Encryption", "status": "info", "detail": "No S3 storage configs found", "anchor": "sec-s3-encryption"})

                  # ── Data Streaming Encryption Check (under Security) ──
                  if streaming_encryption_info:
                      total_streams = len(streaming_encryption_info)
                      # KVS: encryption status is known from Connect config
                      kvs_streams = [s for s in streaming_encryption_info if s['stream_type'] == 'Kinesis Video Stream']
                      kvs_encrypted = sum(1 for s in kvs_streams if s['encrypted'] is True)
                      kvs_unencrypted = sum(1 for s in kvs_streams if s['encrypted'] is False)
                      # KDS/Firehose: encryption is at stream level, not in Connect config — unknown from here
                      kds_streams = [s for s in streaming_encryption_info if s['stream_type'] == 'Kinesis Data Stream']
                      firehose_streams = [s for s in streaming_encryption_info if s['stream_type'] == 'Kinesis Firehose']

                      stream_enc_rows = ""
