                          name = escape(ai_agent.get('name', 'N/A'))
                          a_type = escape(ai_agent.get('type', 'N/A'))
                          status = escape(agent.get('status', 'N/A'))
          
                          # Extract tools from configuration
                          config = ai_agent.get('configuration', {})
                          logger.info(f"[O1] Agent '{name}' config keys: {list(config.keys())}")
                          orch = config.get('orchestrationAIAgentConfiguration', {})
                          logger.info(f"[O1] Agent '{name}' orch keys: {list(orch.keys())}")
                          tools = orch.get('toolConfigurations', [])
                          logger.info(f"[O1] Agent '{name}' has {len(tools)} tool(s) in toolConfigurations")
          
                          # Categorize tools
                          mcp_tools = []
                          builtin_tools = []
                          for t in tools:
                              t_type = t.get('toolType', 'UNKNOWN')
                              t_name = t.get('toolName', t.get('title', 'unknown'))
                              logger.debug(f"[O1]   Tool: type={t_type}, name={t_name}")
                              if t_type == 'MODEL_CONTEXT_PROTOCOL':
                                  mcp_tools.append(t_name)
                              else:
                                  builtin_tools.append(t_name)
          
                          # Build tools cell
                          total_tools = len(mcp_tools) + len(builtin_tools)
                          if total_tools > 0:
                              parts = []
                              if mcp_tools:
                                  parts.append(f"{len(mcp_tools)} MCP")
                              if builtin_tools:
                                  parts.append(f"{len(builtin_tools)} built-in")
                              tool_display = " + ".join(parts)
                              tool_color = '#FF0000' if len(mcp_tools) > 30 else '#FFA500' if len(mcp_tools) > 15 else '#00FF00' if mcp_tools else '#CCCCCC'
                              tool_cell = f'<span style="color:{tool_color}; font-weight:bold;">{tool_display}</span>'
                              all_names = mcp_tools + builtin_tools
                              tool_cell += f'<br><small>{", ".join(escape(n) for n in all_names[:6])}'
                              if len(all_names) > 6:
                                  tool_cell += f'... +{len(all_names)-6} more'
                              tool_cell += '</small>'
                          else:
                              tool_cell = '<span style="color:#999;">None</span>'
          
                          # Find security profile — match by checking which profile has MCP apps
                          # whose namespace matches tools in this agent
                          sp_cell = '<span style="color:#999;">—</span>'
                          agent_tool_ids = set()
                          for t in tools:
                              tid = t.get('toolId', '')
                              if tid:
                                  agent_tool_ids.add(tid)
                                  # Also extract namespace from toolId like "gateway_NAMESPACE__TARGET___op"
                                  if 'gateway_' in tid:
                                      ns = tid.split('__')[0].replace('gateway_', '')
                                      agent_tool_ids.add(ns)
          
                          if agent_tool_ids:
                              for sp_id, sp_info in sp_apps_map.items():
                                  matched = False
                                  for app in sp_info['apps']:
                                      ns = app.get('Namespace', '')
                                      if ns and any(ns in tid for tid in agent_tool_ids):
                                          matched = True
                                          break
                                  if matched:
                                      sp_cell = escape(sp_info['name'])
                                      logger.info(f"[O1] Agent '{name}' matched security profile '{sp_info['name']}'")
                                      break
          
                          logger.info(f"[O1] Agent: {name}, mcp={len(mcp_tools)}, builtin={len(builtin_tools)}, sp={sp_cell}")
                      except Exception as detail_err:
                          logger.warning(f"[O1] Failed to get detail for agent {a_id}: {detail_err}")
                          name = escape(agent.get('name', 'N/A'))
                          a_type = 'N/A'
                          status = escape(agent.get('status', 'N/A'))
                          tool_cell = 'N/A'
                          sp_cell = 'N/A'
                      html += f"<tr><td>{name}</td><td>{a_type}</td><td>{status}</td><td>{tool_cell}</td><td>{sp_cell}</td></tr>"
